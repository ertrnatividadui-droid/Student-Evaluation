<!doctype html>
<html>
    <head>
        <title>Student Evaluation</title>
        <meta name="viewport content="width=device-width, initial-scale=1.0>
        <link rel="icon" type="image/png" href="icon-192.png">
        <link rel="manifest" href="manifest.json">
        
        </head>
        
             <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
                background-color: rgb(135, 197, 221);
            }
            h1 {
                color: rgba(255, 255, 255, 0.925);
            }
            form {
                max-width: 400px;
                margin-top: 20px;
            }
            label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }
            input[type="text"], textarea {
                width: 100%;
                padding: 8px;
                margin-bottom: 15px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            button {
                background-color: rgb(56, 149, 185);
                color: white;
            }
        </style>
     
            

    
    
    
       <body>
    <center><h1>Student Evaluation</h1></center>
    
    <div id="form">
    <label for="s1">Student Name</label>
        <input type="text" id="s1" placeholder=" ">
        <br><br>
        <label for="s1">Professor Name</label>
        <input type="text" id="pr1" placeholder="">
        <br><br>
        <label for="s1">Evaluation</label>
        <input type="text" id="pr1" placeholder="">
        <br><br>
        <input type="number" id="grade" placeholder="Grade">
        <br><br>
       
        <button  id="submit">Submit</button>
    </div>
    
    <p id="result"></p>
    
    </body>

    

    <script>
        // Function to evaluate grade
        function evaluateStudent() {
            const studentName = document.getElementById('s1').value.trim();
            const professorName = document.getElementById('pr1').value.trim();
            const gradeInput = document.getElementById('grade').value.trim();
            const resultEl = document.getElementById('result');

            if (!studentName || !professorName || gradeInput === "") {
                resultEl.textContent = "Please fill all fields correctly.";
                resultEl.className = "";
                return;
            }

            const grade = parseInt(gradeInput);
            let status = "";
            let statusClass = "";

            if (grade >= 80) {
                status = `Congrats! Sir/Ma'am ${professorName}, pasado ka.`;
                statusClass = "pass";
            } else {
                status = `Sorry, Sir/Ma'am ${professorName}, pang plite lng sa jeep imo grade`;
                statusClass = "fail";
            }

            resultEl.innerHTML = `
                Student: ${studentName}<br>
                Professor: ${professorName}<br>
                Grade: ${grade}<br>
                ${status}
            `;
            resultEl.className = statusClass;
        }

        // Event listener
        document.getElementById('submit').addEventListener('click', evaluateStudent);

        // Service worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(() => console.log('Service Worker registered successfully.'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</html>
