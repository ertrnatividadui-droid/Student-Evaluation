<!doctype html>
<html>
    <head>
        <title>Student Evaluation</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#33e0ff">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

         <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            h1 {
                color: rgba(106, 216, 250, 0.925);
            }
            form {
                max-width: 400px;
                margin-top: 20px;
            }
            label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }
            input[type="text"], textarea {
                width: 100%;
                padding: 8px;
                margin-bottom: 15px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            input[type="submit"] {
                background-color: #77ebff;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            input[type="submit"]:hover {
                background-color: #33e0ff;
            }
        </style>
    </head>

    <body>
        <h1>Student Evaluation</h1>
        <p>Welcome to the student evaluation page. Please fill out the form below to submit your evaluation.</p>
        <form action="/submit-evaluation" method="post">
            <label for="student-name">Name</label>
            <input type="text" id="student-name" name="student-name" required>
            <br><br>
            <label for="professor-name">Professor Name</label>
            <input type="text" id="professor-name" name="professor-name" required>
            <br><br>
            <label for="evaluation">Evaluation:</label>
            <textarea id="evaluation" name="evaluation" required></textarea>
            <br><br>
            <label for="grade">Grade</label>
            <input type="text" id="grade" name="grade" required>
            <br><br>
            <button type="submit">Submit Evaluation</button>
        </form>
    </body>
<script>
    let Grade=80;
    {
        if (grade >= 80) {
            console.log("Passed")
        } 
        else{
            console.log("Failed")
        }
    }
</script>
</html>
